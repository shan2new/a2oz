<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>a2oz logo candidates</title>
<style>
  :root {
    --bg: #f6f6f8;
    --panel: #ffffff;
    --ink: #0a0a0f;
    --muted: #6b6b78;
    --line: #e6e6ec;
    --brand: #863bff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  header { padding: 28px 32px 12px; }
  header h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  header p  { color: var(--muted); margin: 0; }
  .grid { display: grid; gap: 16px; padding: 16px 32px 64px; grid-template-columns: 1fr; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .card h2 { font-size: 13px; font-weight: 600; margin: 0; padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .card h2 small { color: var(--muted); font-weight: 400; }
  .row { display: grid; grid-template-columns: 1fr 1fr; }
  .swatch { padding: 24px 16px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .swatch.light { background: #ffffff; }
  .swatch.dark  { background: #0a0a0f; color: #ededf0; }
  .swatch.brand { background: var(--brand); color: white; }
  .swatch + .swatch { border-left: 1px solid var(--line); }
  .size { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .size img { display: block; image-rendering: -webkit-optimize-contrast; }
  .size span { font-size: 11px; color: inherit; opacity: 0.6; font-variant-numeric: tabular-nums; }
  /* For currentColor variant we need the SVG inlined or fetched; we'll just use object on a colored background */
  .currentcolor-host { color: var(--brand); }
  .currentcolor-host.dark  { color: #ededf0; }
  .currentcolor-host.brand { color: #ffffff; }
</style>
</head>
<body>
<header>
  <h1>a2oz logo candidates</h1>
  <p>Each row is one design. Each side is a background. Sizes: 16 / 24 / 32 / 48 / 64 / 128 / 256.</p>
</header>

<div class="grid" id="grid"></div>

<script>
  const sizes = [16, 24, 32, 48, 64, 128, 256];
  const candidates = [
    { id: '01-flat-purple',         label: '01 · Flat purple',          note: 'Solid #863bff, transparent. Most direct port of current mark.' },
    { id: '02-flat-currentcolor',   label: '02 · CurrentColor',         note: 'Inherits text color — adapts to UI theme.', currentColor: true },
    { id: '03-gradient',            label: '03 · Linear gradient',      note: '2-stop purple gradient. Holds at 32px+; muddy at 16.' },
    { id: '04-tile-purple-white',   label: '04 · White on purple tile', note: 'iOS / Android app-icon style. Opaque, brand-forward.' },
    { id: '05-tile-gradient',       label: '05 · Tile + gradient bg',   note: 'Same as 04 with subtle gradient tile.' },
    { id: '06-tile-dark',           label: '06 · Mark on dark tile',    note: 'Purple mark on near-black tile. Contrast-y.' },
  ];

  function render(cand, bg) {
    const isCC = cand.currentColor;
    return sizes.map(s => {
      const tag = isCC
        ? `<object type="image/svg+xml" data="${cand.id}.svg" width="${s}" height="${s}"></object>`
        : `<img src="${cand.id}.svg" width="${s}" height="${s}" alt="">`;
      return `<div class="size"><div class="${isCC ? 'currentcolor-host ' + bg : ''}">${tag}</div><span>${s}</span></div>`;
    }).join('');
  }

  document.getElementById('grid').innerHTML = candidates.map(c => `
    <div class="card">
      <h2>${c.label}<small>${c.note}</small></h2>
      <div class="row">
        <div class="swatch light">${render(c, 'light')}</div>
        <div class="swatch dark">${render(c, 'dark')}</div>
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
